name: Daily News & Price Log

on:
  schedule:
    - cron: '30 3 * * *'  # 3:30 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-log:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Fetch Bitcoin price
        id: bitcoin
        run: |
          BTC_PRICE=$(curl -s https://api.coindesk.com/v1/bpi/currentprice/USD.json | jq '.bpi.USD.rate_float' | cut -d'.' -f1)
          echo "price=$BTC_PRICE" >> $GITHUB_OUTPUT

      - name: Get yesterday's date
        id: date
        run: |
          YESTERDAY=$(date -d 'yesterday' '+%B %d, %Y')
          echo "yesterday=$YESTERDAY" >> $GITHUB_OUTPUT

      - name: Update daily_log.txt
        run: |
          cat >> daily_log.txt << 'EOF'

          ${{ steps.date.outputs.yesterday }} - Bitcoin Price: $${{ steps.bitcoin.outputs.price }}+ | Top world news: Check newsapi.org or major news outlets for headline
          EOF

      - name: Commit and push to main
        run: |
          git add daily_log.txt
          git commit -m "Daily update: ${{ steps.date.outputs.yesterday }} - Bitcoin price and news"
          git push origin main
          branch: daily-update-${{ github.run_number }}
          delete-branch: false
